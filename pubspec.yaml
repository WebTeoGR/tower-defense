name: tower_defense
description: "Tower Defense MVP - a Flame-based mobile game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.20.0
  flame_audio: ^2.0.0
  audioplayers: ^6.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Assets folder for future sprite sheets and images
  # Add your sprite PNGs here when replacing placeholder rendering
  assets:
    - assets/images/
    - assets/images/enemies/troll/
    - assets/images/enemies/fast/
    - assets/images/enemies/tank/
